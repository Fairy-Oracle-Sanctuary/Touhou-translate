name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13-large
            arch: x64
          - os: macos-14
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Build with Nuitka
        run: python Fairy-Kekkai-Workshop/deploy.py

      - name: Package artifact
        run: |
          cd Fairy-Kekkai-Workshop/dist
          zip -r "Fairy-Kekkai-Workshop-macos-${{ matrix.arch }}.zip" "Fairy Kekkai Workshop.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fairy-Kekkai-Workshop-macos-${{ matrix.arch }}
          path: Fairy-Kekkai-Workshop/dist/Fairy-Kekkai-Workshop-macos-${{ matrix.arch }}.zip

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/Fairy-Kekkai-Workshop-macos-x64/*
            artifacts/Fairy-Kekkai-Workshop-macos-arm64/*
          generate_release_notes: true
